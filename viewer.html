<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Xem Thông Tin Lô Hàng - Quản Lý Trái Cây</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fa; margin: 0; padding: 20px; line-height: 1.6; }
    .container { max-width: 700px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #0066ff; color: white; padding: 20px; text-align: center; }
    .content { padding: 30px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .info-item { background: #f8f9ff; padding: 12px 16px; border-radius: 8px; border-left: 4px solid #0066ff; }
    .label { font-size: 13px; color: #666; margin-bottom: 4px; }
    .value { font-size: 17px; font-weight: 600; color: #333; }
    .ma-lo { font-size: 22px; font-weight: bold; color: #0066ff; text-align: center; padding: 15px; background: #f0f4ff; border-radius: 8px; margin: 20px 0; }
    button { padding: 12px 24px; background: #0066ff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px; }
    .scan-btn { background: #28a745; }

    /* Modal Quét QR */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      overflow: hidden;
    }
    .modal-header {
      padding: 15px 20px;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }
    .close-btn { font-size: 28px; cursor: pointer; color: #666; }
    #reader { width: 100%; min-height: 300px; background: #000; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>📋 Thông Tin Lô Hàng</h1></header>
    
    <div class="content">
      <div id="loading" style="text-align:center; padding:40px;">Đang tải thông tin...</div>

      <div id="result" style="display:none;">
        <div class="ma-lo" id="maLoDisplay"></div>
        <div class="info-grid">
          <div class="info-item"><div class="label">Ngày Nhập</div><div class="value" id="ngayDisplay"></div></div>
          <div class="info-item"><div class="label">Biển Số Xe</div><div class="value" id="biensoDisplay"></div></div>
          <div class="info-item"><div class="label">Kho</div><div class="value" id="khoDisplay"></div></div>
          <div class="info-item"><div class="label">TT Xe</div><div class="value" id="ttxeDisplay"></div></div>
          <div class="info-item"><div class="label">Tổng Khối Lượng</div><div class="value" id="tongklDisplay"></div></div>
          <div class="info-item"><div class="label">Nhà Cung Cấp</div><div class="value" id="nccDisplay"></div></div>
          <div class="info-item"><div class="label">Nơi Xuất Sản</div><div class="value" id="noiDisplay"></div></div>
          <div class="info-item"><div class="label">Hàng</div><div class="value" id="hangDisplay"></div></div>
          <div class="info-item"><div class="label">Múi</div><div class="value" id="muiDisplay"></div></div>
          <div class="info-item"><div class="label">Vị Trí</div><div class="value" id="vitriDisplay"></div></div>
        </div>

        <div style="text-align:center; margin-top:30px;">
          <button class="scan-btn" onclick="startScanOnViewer()">📷 Quét QR Mới</button>
        </div>
      </div>

      <div id="error" style="display:none; color:red; text-align:center; padding:40px;">
        Không tìm thấy thông tin cho mã QR này.
      </div>
    </div>
  </div>

  <!-- Modal Quét QR -->
  <div id="scanModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📷 Quét Mã QR Code</h3>
        <span onclick="closeScanModal()" class="close-btn">&times;</span>
      </div>
      <div id="reader"></div>
      <div id="scanResult" style="text-align:center; padding:15px; min-height:50px;"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <script>
    // ... (phần firebase và loadQRInfo giữ nguyên như trước) ...

    const firebaseConfig = { /* giữ nguyên */ 
      apiKey: "AIzaSyCtmyLlGJuCn35kYR6819XbaP6665KKgd8",
      authDomain: "quanlysaurieng.firebaseapp.com",
      databaseURL: "https://quanlysaurieng-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "quanlysaurieng",
      storageBucket: "quanlysaurieng.firebasestorage.app",
      messagingSenderId: "5286982913",
      appId: "1:5286982913:web:0dc61051f41fab874cd700"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const historyRef = db.ref('qrHistory');

    let html5QrCode = null;

    async function loadQRInfo(maLo) {
      // ... (giữ nguyên hàm loadQRInfo trước đó của bạn) ...
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      loading.style.display = 'block';
      result.style.display = 'none';
      error.style.display = 'none';

      try {
        const snapshot = await historyRef.once('value');
        const data = snapshot.val();
        let item = data ? Object.values(data).find(h => h.ma_lo === maLo) : null;

        if (item) {
          document.getElementById('maLoDisplay').textContent = item.ma_lo || maLo;
          document.getElementById('ngayDisplay').textContent = item.ngay_display || 'Không có';
          document.getElementById('biensoDisplay').textContent = item.bienso && item.bienso.trim() !== '' ? item.bienso : 'Không có';

          let khoList = [];
          if (item.kho1 && item.kho1.trim() !== '') khoList.push(item.kho1);
          if (item.kho2 && item.kho2.trim() !== '') khoList.push(item.kho2);
          if (item.kho3 && item.kho3.trim() !== '') khoList.push(item.kho3);
          if (item.kho4 && item.kho4.trim() !== '') khoList.push(item.kho4);

          document.getElementById('khoDisplay').textContent = khoList.length ? khoList.join(' - ') : 'Không có';

          document.getElementById('tongklDisplay').textContent = item.tongkl ? item.tongkl + ' kg' : 'Không có';
          document.getElementById('ttxeDisplay').textContent = item.ttxe || '—';
          document.getElementById('nccDisplay').textContent = item.ncc || '—';
          document.getElementById('noiDisplay').textContent = item.noi || '—';
          document.getElementById('hangDisplay').textContent = item.hang || '—';
          document.getElementById('muiDisplay').textContent = item.mui || '—';
          document.getElementById('vitriDisplay').textContent = 
            (item.vitri1 && item.vitri2) ? `${item.vitri1}/${item.vitri2}` : (item.vitri1 || '—');
          
          result.style.display = 'block';
        } else {
          document.getElementById('maLoDisplay').textContent = maLo;
          document.getElementById('ngayDisplay').textContent = 'Không tìm thấy chi tiết';
          document.getElementById('biensoDisplay').textContent = '—';
          document.getElementById('khoDisplay').textContent = '—';
          result.style.display = 'block';
        }
      } catch (err) {
        error.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    function startScanOnViewer() {
      document.getElementById('scanModal').style.display = 'flex';
      document.getElementById('scanResult').innerHTML = '';
      startScanner();
    }

    function closeScanModal() {
      stopScanner();
      document.getElementById('scanModal').style.display = 'none';
    }

    function startScanner() {
      if (html5QrCode) stopScanner();
      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 280 } },
        (decodedText) => {
          stopScanner();
          closeScanModal();
          if (decodedText.includes('viewer.html')) {
            window.location.href = decodedText;
          } else {
            window.location.href = `viewer.html?q=${encodeURIComponent(decodedText)}`;
          }
        },
        () => {}
      ).catch(err => {
        alert("Không thể mở camera.\nVui lòng cho phép quyền Camera trong trình duyệt.");
        closeScanModal();
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
        html5QrCode = null;
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const maLo = urlParams.get('q');

    if (maLo) loadQRInfo(maLo);
    else document.getElementById('loading').innerHTML = `<p style="color:red;">Không có mã QR.<br>Vui lòng truy cập: <strong>viewer.html?q=MÃ_LÔ</strong></p>`;
  </script>
</body>
</html>
